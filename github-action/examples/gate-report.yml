name: Gate Security Scan - Report Mode
on:
  pull_request:
  push:

jobs:
  gate-report:
    runs-on: ubuntu-latest
    name: Security Scan (Report Only)
    
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - uses: actions/checkout@v3
      
      - uses: penumbra/gate@v1
        with:
          mode: report
          failure-mode: warn
          slack-webhook: ${{ secrets.SLACK_WEBHOOK }}
